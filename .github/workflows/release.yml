name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # 确定本次构建对应的 release:
  # - push 到 main: 自动创建 pre-release,tag 为 <版本号>+build.<run_number>
  # - 手动创建 release: 直接使用该 release 和用户填写的 tag
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.info.outputs.release_id }}
      tag: ${{ steps.info.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "release_id=${{ github.event.release.id }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
            TAG="${VERSION}+build.${{ github.run_number }}"
            RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases" \
              -f tag_name="$TAG" \
              -f target_commitish="${{ github.sha }}" \
              -f name="$TAG" \
              -F prerelease=true \
              -F generate_release_notes=true \
              --jq .id)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: x86 / x86_64 / arm64
          - os: windows-latest
            target: i686-pc-windows-msvc
            args: --target i686-pc-windows-msvc
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          # WiX(msi) 不支持 arm64,只出 NSIS 安装包
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles nsis
          # Linux: x86_64 / arm64 (32 位 x86 的 WebKitGTK 依赖不可用,不构建)
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            args: ""
          # macOS: x86_64 (Intel) / arm64 (Apple Silicon)
          - os: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # 手动 release 时,把用户的 tag(去掉可能的 v 前缀)写入应用版本号
      - name: Set app version from tag
        if: github.event_name == 'release'
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}" node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xdg-utils

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: ${{ matrix.args }}
